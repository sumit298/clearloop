name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, github_implementation_logger ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./clearloop-backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: clearloop-backend/yarn.lock
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      
      - name: Run TypeScript check
        run: yarn tsc --noEmit
      
      - name: Build backend
        run: yarn build
      
      - name: Run tests (if available)
        run: yarn test || echo "No tests configured"
        continue-on-error: true

  frontend-build:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./clearloop-frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: clearloop-frontend/yarn.lock
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      
      - name: Create .env.local
        run: |
          echo "NEXT_PUBLIC_API_URL=http://localhost:8000" > .env.local
      
      - name: Run TypeScript check
        run: yarn tsc --noEmit
      
      - name: Build frontend
        run: yarn build
      
      - name: Run tests (if available)
        run: yarn test || echo "No tests configured"
        continue-on-error: true

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Lint Backend
        working-directory: ./clearloop-backend
        run: |
          yarn install --frozen-lockfile
          yarn lint || echo "No lint configured"
        continue-on-error: true
      
      - name: Lint Frontend
        working-directory: ./clearloop-frontend
        run: |
          yarn install --frozen-lockfile
          yarn lint || echo "No lint configured"
        continue-on-error: true

  deploy-notification:
    name: Deployment Ready
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Notify deployment ready
        run: |
          echo "✅ All builds passed! Ready for deployment to production."
          echo "Backend: ✓"
          echo "Frontend: ✓"
